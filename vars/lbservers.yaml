haproxy_backend_list:
  # Servidores simples
  - name: apache.exemplo.com
    value: |
      mode http
      timeout server 10m
      http-request set-header X-Forwarded-Proto https if { ssl_fc }
      server apache-foo 192.168.60.20:443 check
  - name: unun.exemplo.com
    value: |
      mode http
      timeout server 10m
      http-request set-header Host %[req.hdr(host)]
      http-request set-header X-Real-IP %[src]
      http-request set-header X-Forwarded-For %[src]
      http-request set-header X-Forwarded-Proto https if { ssl_fc }
      server unun-foo 192.168.60.23:443 check ssl verify none
